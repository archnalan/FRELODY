services:

  # ── SQL Server 2022 ─────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: frelody-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Frelody@Strong1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Frelody@Strong1' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - frelody-net

  # ── Nginx Gateway ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: frelody-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frelody-web
      - frelody-api
    networks:
      - frelody-net

  # ── FRELODY API ──────────────────────────────────────────────
  frelody-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: frelody-api:${APP_VERSION:-latest}
    container_name: frelody-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__SongData: >-
        Server=sqlserver,1433;
        Database=SongData;
        User Id=sa;
        Password=Frelody@Strong1;
        Encrypt=False;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True

      # $$ is the docker-compose escape for a literal dollar sign
      Jwt__Key: "G#?fjlb4d$$eJ#8rksgdR$$eJ#v4wd$$eJ#8drRh$$epaJo#"
      Jwt__Issuer: "frelody.com"
      Jwt__Audience: "frelody.com"

      # Include the web container's host port so CORS allows it
      AllowedOrigins__0: "http://localhost:5080"
      AllowedOrigins__1: "http://localhost:8080"
      AllowedOrigins__2: "http://localhost:4200"
      AllowedOrigins__3: "http://localhost:3000"
      AllowedOrigins__4: "http://localhost"
      AllowedOrigins__5: "http://frelody.com"
      AllowedOrigins__6: "https://frelody.com"
      AllowedOrigins__7: "http://www.frelody.com"
      AllowedOrigins__8: "https://www.frelody.com"
      AllowedOrigins__9: "http://164.68.118.82"
      AllowedOrigins__10: "http://164.68.118.82:8080"

      # Frontend URL for password reset emails
      AppSettings__FrontendUrl: "http://localhost:5080"

      # ── Google OAuth ───────────────────────────────────────────────────────
      # Sourced from .env (same pattern as docker-compose.prod.yml). Without
      # these the API falls back to the appsettings.json placeholders
      # (MY_GOOGLE_CLIENT_ID / MY_GOOGLE_CLIENT_SECRET) and Google rejects the
      # consent request with "Error 401: invalid_client". The redirect URI and
      # the JS origin must also be registered in the Google Cloud console.
      GoogleAuth__client_id: "${GOOGLE_CLIENT_ID}"
      GoogleAuth__client_secret: "${GOOGLE_CLIENT_SECRET}"
      GoogleAuth__redirectUri: "${GOOGLE_REDIRECT_URI:-http://localhost:5080/login}"

      # ── Share-link landing (OG previews) ───────────────────────────────────
      # User-facing origin for copied share URLs. Nginx (port 80) proxies
      # /shared/* and /share-og/* to this API container, so the public origin
      # is the gateway host, not the API container.
      ShareLanding__PublicBaseUrl: "http://localhost"
      ShareLanding__AppBaseUrl: "http://localhost"
      ShareLanding__SiteName: "Frelody"

      # Disable HTTPS redirect – container serves plain HTTP behind a proxy
      ASPNETCORE_HTTPS_PORT: ""

      # ── OpenTelemetry: push to local collector ──────────────────────────────
      OpenTelemetry__Endpoint: "http://otel-collector:4318"
      OpenTelemetry__EnableConsole: "false"
      OpenTelemetry__Headers: ""

      ChordMini__BaseUrl: "http://chordmini-backend:8080"
      ChordMini__YtdlpUrl: "http://chordmini-backend:8081"

    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - frelody_media:/app/media
    networks:
      - frelody-net

  # ── FRELODY Web UI (Blazor) ──────────────────────────────────
  frelody-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: frelody-web:${APP_VERSION:-latest}
    container_name: frelody-web
    ports:
      - "5080:5080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker

      # Server-side Refit clients reach the API via the internal Docker network.
      # The WASM (browser) portion always uses the exposed host port http://localhost:8080.
      ApiSettings__BaseUrl: "http://frelody-api:8080"

      # Disable HTTPS redirect – the container serves plain HTTP behind a
      # potential reverse proxy; redirecting to HTTPS here would cause a blank page.
      ASPNETCORE_HTTPS_PORT: ""

      # App version (set by CI/CD, defaults to "dev" locally)
      AppSettings__Version: "${APP_VERSION:-dev}"

      # Persist Data Protection keys in a named volume so that antiforgery
      # tokens and auth cookies remain valid across container restarts.
      # Without this, every restart generates a new key ring and existing
      # browser cookies become undecryptable → blank screen.
      ASPNETCORE_DataProtection__KeysDirectory: "/app/dp-keys"

    volumes:
      - frelody_dp_keys:/app/dp-keys
    depends_on:
      frelody-api:
        condition: service_healthy
    networks:
      - frelody-net

  # ── smtp4dev (dev mail catcher) ──────────────────────────────
  # Catches all outgoing emails – no real mail is sent.
  # Web UI: http://localhost:5000   SMTP: localhost:1025
  maildev:
    image: rnwood/smtp4dev:v3
    container_name: frelody-maildev
    ports:
      - "1025:25"      # SMTP
      - "5000:80"      # Web UI
    networks:
      - frelody-net

  # ── OpenTelemetry Collector ──────────────────────────────────
  # Receives OTLP from frelody-api and fans out to Jaeger + console.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: frelody-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"    # OTLP/HTTP receiver (host → container)
    depends_on:
      - jaeger
    networks:
      - frelody-net

  # ── Jaeger all-in-one (trace UI) ─────────────────────────────
  # Trace explorer: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: frelody-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP/gRPC (used by collector → jaeger)
    networks:
      - frelody-net

  # ── bgutil PO-token provider ─────────────────────────────────
  # Mints YouTube Proof-of-Origin tokens so server-side yt-dlp clears the
  # "confirm you're not a bot" wall without a logged-in cookie or end-user auth.
  # Consumed only internally by the yt-dlp sidecar at http://bgutil-provider:4416.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: frelody-bgutil
    restart: unless-stopped
    networks:
      - frelody-net

  # ── ChordMini Python ML backend ─────────────────────────────
  chordmini-backend:
    image: ptnghia/chordminiapp-backend:latest
    platform: linux/amd64
    container_name: frelody-chordmini
    # Startup: the prebuilt image's venv is root-owned and read-only to the app
    # user, so install the bgutil PO-token plugin into a writable dir and expose it
    # via PYTHONPATH (yt-dlp's external-plugin mechanism). Then run gunicorn (main
    # app, port 8080) + the yt-dlp sidecar (port 8081) together. ($$ = literal $.)
    command:
      - "sh"
      - "-c"
      - "PLUGDIR=/tmp/ytdlp-plugins; /opt/venv/bin/pip install -q --no-cache-dir -U --target=$$PLUGDIR yt-dlp bgutil-ytdlp-pot-provider || true; export PYTHONPATH=$$PLUGDIR:$${PYTHONPATH}; gunicorn --bind 0.0.0.0:8080 --workers 2 --timeout 600 --worker-class sync --max-requests 1000 --max-requests-jitter 100 --preload app:app & python /app/ytdlp_server.py"
    ports:
      - "5001:8080"
      - "5002:8081"
    environment:
      FLASK_ENV: production
      MAX_CONTENT_LENGTH_MB: "150"
      # yt-dlp bot-wall bypass tunables (see docker/ytdlp_server.py)
      # NOTE (2026-06-11): "tv" now returns only un-downloadable SABR/storyboard
      # streams (YouTube server-side change), so "default,tv" yields "no audio
      # format". "default" (web) is the only client that actually downloads with
      # our cookies. It still gets IP-walled on most videos from this datacenter
      # IP — the residential/mobile proxy (YTDLP_PROXY) is the real fix.
      YTDLP_PLAYER_CLIENT: "default"
      YTDLP_POT_BASE_URL: "http://bgutil-provider:4416"
      # Datacenter IPs (this is a Contabo VPS) get bot-walled even WITH a valid PO
      # token, so we escalate to logged-in cookies. Export a throwaway YouTube
      # account's cookies into ./docker/cookies/youtube.txt (Netscape format) — see
      # CLAUDE.md "AI Analysis / YouTube bot-wall". Absent file → sidecar no-ops.
      YTDLP_COOKIES_FILE: "/app/cookies/youtube.txt"
      # Last-resort escalation: route yt-dlp through a residential/mobile proxy —
      # the only lever that repairs the datacenter IP's reputation without a
      # logged-in account. Stacks with the PO token + cookies. Off unless set in
      # .env (e.g. YTDLP_PROXY=http://user:pass@host:port or socks5://host:port).
      YTDLP_PROXY: "${YTDLP_PROXY:-}"
    depends_on:
      - bgutil-provider
    volumes:
      - frelody_media:/app/media
      - chordmini_models:/app/models
      - ./docker/ytdlp_server.py:/app/ytdlp_server.py:ro
      # Read-only: the sidecar copies this to a writable temp file per call so
      # yt-dlp's cookie-jar rewrite can't corrupt or rotate the source.
      - ./docker/cookies:/app/cookies:ro
    networks:
      - frelody-net

  # ── YouTube cookie refresher ────────────────────────────────────────────
  # Keeps a logged-in cookie jar alive so the datacenter-IP bot-wall stays
  # bypassed without a human re-exporting cookies every ~2 weeks. Bootstrap is a
  # one-time human step: export a throwaway account's cookies from Firefox and
  # drop them as ./docker/cookies/youtube.seed.txt; this then keeps youtube.txt
  # fresh. Official MS Playwright image (Chromium + deps baked in) — no build.
  # Runs as root to write the root-owned cookies mount; Chromium uses --no-sandbox.
  # Shares the host egress IP with chordmini, so cookies match yt-dlp's call IP.
  cookie-refresher:
    image: mcr.microsoft.com/playwright/python:v1.60.0-jammy
    container_name: frelody-cookie-refresher
    restart: unless-stopped
    user: root
    # The MS image bundles the browsers (/ms-playwright) + OS deps but NOT the
    # playwright pip package — install the matching version at startup (it reuses
    # the bundled chromium via PLAYWRIGHT_BROWSERS_PATH; no browser download).
    command: ["bash", "-lc", "pip install -q playwright==1.60.0 && exec python /app/cookie_refresher.py"]
    environment:
      COOKIES_DIR: "/cookies"
      PROFILE_DIR: "/profile"
      REFRESH_INTERVAL_HOURS: "24"
      # Rotation slots + published status live in the shared frelody_media volume
      # so the FRELODY API (which already mounts it) can write fresh-cookie pastes
      # and read liveness for the SuperAdmin UI. Refresher tries slots newest→oldest.
      SLOTS_DIR: "/media/cookie-seeds"
      STATUS_PUBLISH: "/media/cookie-status.json"
      MAX_SLOTS: "3"
      SLOT_POLL_SECONDS: "60"
      # Set true ONLY to test the browser→file→sidecar plumbing without a real
      # login; never leave on in prod (would write a junk anonymous jar).
      REFRESH_ALLOW_UNAUTHENTICATED: "${COOKIE_REFRESH_ALLOW_ANON:-false}"
    volumes:
      - ./docker/cookie_refresher.py:/app/cookie_refresher.py:ro
      # RW: this service owns youtube.txt; chordmini mounts the same dir :ro.
      - ./docker/cookies:/cookies
      - cookie_profile:/profile
      # Shared with frelody-api: API writes rotation slots here, refresher reads
      # them + publishes status back for the SuperAdmin UI.
      - frelody_media:/media
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time,sys; p='/cookies/.refresher-status.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < float(os.environ.get('REFRESH_INTERVAL_HOURS','24'))*7200+600 else 1)\""]
      interval: 300s
      timeout: 15s
      retries: 3
      start_period: 180s
    networks:
      - frelody-net

volumes:
  sqlserver_data:
  frelody_media:
  frelody_dp_keys:
  chordmini_models:
  cookie_profile:

networks:
  frelody-net:
    driver: bridge
