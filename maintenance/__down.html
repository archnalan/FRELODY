<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Frelody — back in a moment</title>
  <!-- Fully self-contained: no external CSS/fonts/images. This page is served by
       the gateway when the app containers are mid-restart, so anything it had to
       fetch from the app would 404. Theme follows the OS preference (the in-app
       theme toggle isn't reachable while the app is down). -->
  <style>
    :root {
      --bg: #f9fafb; --surface: #ffffff; --text: #374151; --muted: #6b7280;
      --accent: #4f46e5; --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020; --surface: #151b2e; --text: #f3f4f6; --muted: #9ca3af;
        --accent: #818cf8; --border: #232a3d;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 70%),
        var(--bg);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%; max-width: 30rem; text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .12);
    }
    .logo {
      font-weight: 800; font-size: 1.6rem; letter-spacing: .02em; margin-bottom: 28px;
    }
    .logo .a { color: var(--text); }
    .logo .b { color: #f59e0b; } /* brand amber (matches .brand-lody = --bs-warning), not indigo */
    .ring {
      width: 84px; height: 84px; margin: 0 auto 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      position: relative;
    }
    .ring::after {
      content: ""; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-top-color: var(--accent);
      animation: spin 1.1s linear infinite;
    }
    .ring svg { width: 38px; height: 38px; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .ring::after { animation: none; } }
    h1 { font-size: 1.4rem; margin: 0 0 10px; }
    p { color: var(--muted); line-height: 1.6; margin: 0 auto; max-width: 24rem; }
    .sub { margin-top: 14px; font-size: .9rem; }
    .dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); margin-right: 7px; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <div class="logo"><span class="a">FRE</span><span class="b">LODY</span></div>
    <div class="ring" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
    </div>
    <h1>We'll be right back</h1>
    <p>Frelody is updating to bring you something better. This usually takes just a moment — your songs and chords are safe.</p>
    <p class="sub"><span class="dot" aria-hidden="true"></span>Reconnecting… this page refreshes itself.</p>
  </main>
  <!-- Auto-retry: reload once the app is back. Cheap client-side polling so Alex
       lands back in the app without touching anything. -->
  <script>
    setTimeout(function () { location.reload(); }, 15000);
  </script>
</body>
</html>
