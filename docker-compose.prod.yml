# ============================================================
# Production overrides for FRELODY
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  nginx:
    image: nginx:alpine
    container_name: frelody-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frelody-web
      - frelody-api
    networks:
      - frelody-net

  sqlserver:
    environment:
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -No -C || exit 1"]

  frelody-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTPS_PORT: ""
      ConnectionStrings__SongData: >-
        Server=sqlserver,1433;
        Database=SongData;
        User Id=sa;
        Password=${SA_PASSWORD};
        Encrypt=False;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True
      Jwt__Key: "${JWT_KEY}"
      # CORS: allow the public domain
      AllowedOrigins__0: "https://${SERVER_HOST}"
      AllowedOrigins__1: "http://${SERVER_HOST}"
      GoogleAuth__client_id: "${GOOGLE_CLIENT_ID}"
      GoogleAuth__client_secret: "${GOOGLE_CLIENT_SECRET}"
      GoogleAuth__redirectUri: "${GOOGLE_REDIRECT_URI}"
      PesaPal__ConsumerKey: "${PESAPAL_CONSUMER_KEY}"
      PesaPal__ConsumerSecret: "${PESAPAL_CONSUMER_SECRET}"
      PesaPal__UseSandbox: "false"
      API_KEYS__nvidiaApiKey: "${NVIDIA_API_KEY}"
      API_KEYS__deepSeekApiKey: "${DEEPSEEK_API_KEY}"
      SmtpCredentials__Default__Host: "${SMTP_HOST}"
      SmtpCredentials__Default__Port: "${SMTP_PORT}"
      SmtpCredentials__Default__EnableSsl: "true"
      SmtpCredentials__Default__EmailSenderAccount: "${SMTP_EMAIL}"
      SmtpCredentials__Default__EmailSenderSecret: "${SMTP_PASSWORD}"
      SmtpCredentials__Default__SupportEmail: "${SUPPORT_EMAIL}"
      SmtpCredentials__Default__DeveloperNotificationEmail: "${DEVELOPER_NOTIFICATION_EMAIL}"
      CurrencyConverter__AppId: "${OPENEXCHANGE_APP_ID}"
      OpenTelemetry__Endpoint: "${OTEL_ENDPOINT:-http://otel-collector:4318}"
      OpenTelemetry__EnableConsole: "false"
      # ── Share-link landing (OG previews) ───────────────────────────────────
      ShareLanding__PublicBaseUrl: "https://${SERVER_HOST}"
      ShareLanding__AppBaseUrl: "https://${SERVER_HOST}"
      ShareLanding__SiteName: "Frelody"
      # Frontend URL for password reset emails
      AppSettings__FrontendUrl: "https://${SERVER_HOST}"
    # Port 8080 no longer needs to be exposed publicly if Nginx handles it
    ports:
      - "8080:8080" 
    depends_on:
      - otel-collector

  frelody-web:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # The client (browser) will call the API via https://domain/api/
      ApiSettings__BaseUrl: "https://${SERVER_HOST}/api"
    # Port 5080 no longer needs to be exposed publicly if Nginx handles it
    ports:
      - "5080:5080"
    networks:
      - frelody-net

networks:
  frelody-net:
    driver: bridge
