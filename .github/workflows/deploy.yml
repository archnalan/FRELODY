# ============================================================
# FRELODY – Auto-deploy on push to main
# ============================================================
# Version bumping rules (format: BREAKING.MAJOR.MINOR)
#   fix/bugfix  → minor +1   (1.0.0 → 1.0.1)
#   feat/feature → major +1  (1.0.1 → 1.1.0)
#   breaking     → breaking +1 (1.2.3 → 2.0.0)
#   Caps: minor 0-9, major 0-9
#     1.0.9 + minor → 1.1.0  (overflow minor → bump major)
#     1.9.9 + minor → 2.0.0  (overflow both → bump breaking)
#     1.9.0 + major → 2.0.0  (overflow major → bump breaking)
#
# Source of truth: version.txt at the repo root.
# Edit that file manually to set any base version (e.g. 2.0.0).
# The action reads it, bumps it, commits it back with [skip ci],
# then tags and deploys.
# ============================================================

name: Deploy FRELODY

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for git push back

      # ── 2. Determine version bump ─────────────────────────
      - name: Calculate next version
        id: version
        run: |
          # Read current version from version.txt (source of truth)
          CURRENT_VERSION=$(cat version.txt | tr -d '[:space:]')
          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION="1.0.0"
          fi
          echo "Current version: $CURRENT_VERSION"

          # Parse current version
          BREAKING=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Read the commit message of the triggering push
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"

          # Determine bump type from commit message prefix
          # Matches: fix:, fix(, fix{, fix[, bugfix:, feat:, feature(, breaking:, etc.
          BUMP="none"
          if echo "$COMMIT_MSG" | grep -qiE '^(breaking)[[:space:]]*[\(:\{\[]'; then
            BUMP="breaking"
          elif echo "$COMMIT_MSG" | grep -qiE '^(feat|feature)[[:space:]]*[\(:\{\[]'; then
            BUMP="major"
          elif echo "$COMMIT_MSG" | grep -qiE '^(fix|bugfix)[[:space:]]*[\(:\{\[]'; then
            BUMP="minor"
          fi
          echo "Bump type: $BUMP"

          if [ "$BUMP" = "none" ]; then
            echo "Commit message does not match a version bump pattern. Skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Apply version bump with overflow logic
          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            if [ "$MINOR" -gt 9 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            if [ "$MAJOR" -gt 9 ]; then
              MAJOR=0
              MINOR=0
              BREAKING=$((BREAKING + 1))
            fi
          elif [ "$BUMP" = "major" ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
            if [ "$MAJOR" -gt 9 ]; then
              MAJOR=0
              BREAKING=$((BREAKING + 1))
            fi
          elif [ "$BUMP" = "breaking" ]; then
            BREAKING=$((BREAKING + 1))
            MAJOR=0
            MINOR=0
          fi

          NEW_VERSION="${BREAKING}.${MAJOR}.${MINOR}"
          echo "New version: $NEW_VERSION"

          # Write new version back to version.txt
          echo "$NEW_VERSION" > version.txt

          echo "new_version=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # ── 3. Commit version.txt bump ─────────────────────────
      - name: Commit version bump
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push origin main

      # ── 4. Tag the new version ─────────────────────────────
      - name: Create version tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin "${{ steps.version.outputs.new_version }}"

      # ── 5. Deploy to remote server via SSH ─────────────────
      - name: Deploy to server
        if: steps.version.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}

            echo "=== Deploying ${{ steps.version.outputs.new_version }} ==="

            # Pull latest changes (includes updated version.txt)
            git pull origin main

            # Rebuild and restart containers with the new version
            export APP_VERSION=${{ steps.version.outputs.new_version }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            # Prune dangling images to free disk space
            docker image prune -f

            echo "=== Deploy complete: ${{ steps.version.outputs.new_version }} ==="

      # ── 6. Create GitHub Release ───────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
