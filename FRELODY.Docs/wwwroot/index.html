<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>FRELODY Documentation</title>
    <base href="/" />
    <meta name="description" content="FRELODY — paste a song link, get chords and lyrics, slow it down and loop it. Official user documentation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="FRELODY.Docs.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
    <div id="app">
        <div class="initial-loader" role="status" aria-label="Loading FRELODY documentation">
            <div class="initial-loader-spinner"></div>
            <p>Loading FRELODY documentation…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unexpected error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <style>
        /* Boot-failure fallback. Lives in the host page (not a Razor
           component) because a WASM download failure happens BEFORE Blazor
           starts, so no component — not even MainLayout — can render. Uses
           the theme vars already set on :root by the inline theme script. */
        .boot-error {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--bg, #fff);
            color: var(--text, #1f2430);
            font-family: var(--font-sans, system-ui, sans-serif);
        }
        .boot-error-card {
            max-width: 30rem;
            text-align: center;
            background: var(--bg-elevated, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: var(--radius-lg, 16px);
            box-shadow: var(--shadow-lg, 0 18px 40px -12px rgba(15, 23, 42, .18));
            padding: 2rem 1.75rem;
        }
        .boot-error-icon { font-size: 2.25rem; line-height: 1; }
        .boot-error-card h1 { font-size: 1.25rem; margin: .75rem 0 .5rem; }
        .boot-error-card p { color: var(--text-muted, #5b6678); margin: 0 0 1.25rem; line-height: 1.55; }
        .boot-error-card button {
            border: 0;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            color: #fff;
            background: var(--accent, #4f46e5);
            border-radius: var(--radius-md, 10px);
            padding: .6rem 1.4rem;
            transition: background var(--transition, 180ms ease);
        }
        .boot-error-card button:hover { background: var(--accent-hover, #4338ca); }
    </style>

    <script>
        // Apply persisted theme before Blazor boots to prevent flash.
        (function () {
            try {
                var saved = localStorage.getItem('frelody-docs-theme');
                if (saved === 'dark' || saved === 'light') {
                    document.documentElement.setAttribute('data-bs-theme', saved);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-bs-theme', 'dark');
                }
            } catch (e) { /* ignore */ }
        })();

        window.frelodyTheme = {
            set: function (mode) {
                document.documentElement.setAttribute('data-bs-theme', mode);
                try { localStorage.setItem('frelody-docs-theme', mode); } catch (e) { }
            },
            get: function () {
                return document.documentElement.getAttribute('data-bs-theme') || 'light';
            }
        };

        window.frelodyScroll = {
            toTop: function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
    </script>
    <script src="js/pdf-export.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // Start Blazor manually so a boot failure (e.g. a framework asset 404s
        // after a stale redeploy, or the network drops mid-download) shows a
        // friendly, actionable message instead of leaving the spinner forever
        // with errors buried in the console.
        (function () {
            function showBootError() {
                var app = document.getElementById('app');
                if (!app) return;
                app.innerHTML =
                    '<div class="boot-error" role="alert">' +
                      '<div class="boot-error-card">' +
                        '<div class="boot-error-icon" aria-hidden="true">⚠️</div>' +
                        '<h1>We couldn’t load the documentation</h1>' +
                        '<p>This is usually a brief network hiccup or a freshly deployed ' +
                        'update still settling in. Reloading the page almost always fixes it.</p>' +
                        '<button type="button" onclick="location.reload()">Reload</button>' +
                      '</div>' +
                    '</div>';
            }
            try {
                Blazor.start().catch(function (err) {
                    console.error('FRELODY Docs failed to start:', err);
                    showBootError();
                });
            } catch (err) {
                console.error('FRELODY Docs failed to start:', err);
                showBootError();
            }
        })();
    </script>
</body>
</html>
