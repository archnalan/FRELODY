<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <title>FRELODY Documentation</title>
    <base href="/" />
    <meta name="description" content="FRELODY — paste a song link, get chords and lyrics, slow it down and loop it. Official user documentation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="FRELODY.Docs.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
    <div id="app">
        <div class="initial-loader" role="status" aria-label="Loading FRELODY documentation">
            <div class="initial-loader-spinner"></div>
            <p>Loading FRELODY documentation…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unexpected error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        // Apply persisted theme before Blazor boots to prevent flash.
        (function () {
            try {
                var saved = localStorage.getItem('frelody-docs-theme');
                if (saved === 'dark' || saved === 'light') {
                    document.documentElement.setAttribute('data-bs-theme', saved);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-bs-theme', 'dark');
                }
            } catch (e) { /* ignore */ }
        })();

        window.frelodyTheme = {
            set: function (mode) {
                document.documentElement.setAttribute('data-bs-theme', mode);
                try { localStorage.setItem('frelody-docs-theme', mode); } catch (e) { }
            },
            get: function () {
                return document.documentElement.getAttribute('data-bs-theme') || 'light';
            }
        };

        window.frelodyScroll = {
            toTop: function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
    </script>
    <script src="js/pdf-export.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
