# ============================================================================
# FRELODY gateway — multi-subdomain reverse proxy.
#
# Isolation rule: every upstream is resolved DYNAMICALLY via Docker's embedded
# DNS (127.0.0.11) using a variable in `proxy_pass`. nginx then re-resolves the
# hostname per request (cached `valid=30s`) instead of pinning the IP at startup.
# This is what keeps the subdomains independent: recreating/redeploying one
# service (e.g. frelody-docs) reshuffles Docker's IP pool, but the other server
# blocks self-heal within 30s instead of 502-ing on a stale cached IP.
# (See CLAUDE.md "IP Address Shifts".) Add new subdomains as their own `server`
# block following this same pattern; never give them `default_server`.
# ============================================================================

server {
    listen 80;
    server_name tickets.frelody.com;
    resolver 127.0.0.11 valid=30s;

    # Forward /api requests to the Ticketing API container
    location /api/ {
        set $tickets_api http://ticketing-api:8090;
        proxy_pass $tickets_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward everything else to the Ticketing Web container
    location / {
        set $tickets_web http://ticketing-web:5090;
        proxy_pass $tickets_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name docs.frelody.com;
    resolver 127.0.0.11 valid=30s;

    # Static Blazor WASM docs, served by its own nginx container
    # (Dockerfile.docs + nginx.docs.conf handles wasm MIME, gzip_static, SPA
    # fallback). frelody-docs is a prod-only service, so use a variable +
    # Docker's embedded DNS resolver: the gateway still starts when the docs
    # container is absent (local dev) and re-resolves its IP across restarts
    # instead of pinning a stale one (see CLAUDE.md "IP Address Shifts").
    location / {
        set $docs_upstream http://frelody-docs:80;
        proxy_pass $docs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    server_name frelody.com www.frelody.com 164.68.118.82 localhost;
    resolver 127.0.0.11 valid=30s;

    # Forward /api requests to the API container
    location /api/ {
        set $frelody_api http://frelody-api:8080;
        proxy_pass $frelody_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running AI analysis
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Share-link landing pages (Open Graph previews for WhatsApp, iMessage,
    # Facebook, Twitter, LinkedIn, Slack, Discord, …). The API emits crawler-
    # friendly HTML with og:/twitter: meta tags and redirects humans to the UI.
    location /shared/ {
        set $frelody_api_shared http://frelody-api:8080;
        proxy_pass $frelody_api_shared;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Generated Open Graph card images (served from the API's wwwroot).
    location /share-og/ {
        set $frelody_api_og http://frelody-api:8080;
        proxy_pass $frelody_api_og;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SuperAdmin-uploaded documentation media (served from the API's frelody_media
    # volume). The docs site (docs.frelody.com) loads these images cross-origin.
    location /docs-media/ {
        set $frelody_api_media http://frelody-api:8080;
        proxy_pass $frelody_api_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward everything else to the Web container
    location / {
        set $frelody_web http://frelody-web:5080;
        proxy_pass $frelody_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
