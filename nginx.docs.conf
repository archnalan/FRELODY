# ============================================================
# nginx config for the FRELODY Docs container (static Blazor WASM)
# The main gateway proxies docs.frelody.com → this container (port 80);
# TLS is terminated upstream at the edge.
# ============================================================

# Ensure the WebAssembly MIME type is correct (older nginx mime.types
# may not include it; the browser refuses to stream-compile otherwise).
types {
    application/wasm wasm;
}

server {
    listen 80;
    server_name docs.frelody.com localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Requests arrive via the main gateway, which forwards the real client
    # IP in X-Forwarded-For. (No set_real_ip_from peers are configured since
    # access logging here isn't security-sensitive for a static docs site.)
    real_ip_header X-Forwarded-For;

    # Serve the precompressed *.gz the WASM publish emits when present,
    # falling back to on-the-fly gzip otherwise.
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml application/octet-stream;

    # Both Blazor bootstrap loaders have STABLE (non-fingerprinted) filenames,
    # so they must never be cached. Otherwise a client can pin an old loader
    # that requests now-deleted, fingerprinted assets after a redeploy —
    # the exact "download '…/System.Linq.<hash>.wasm' failed 404 /
    # Failed to start platform" failure.
    #
    #   * blazor.webassembly.js — the entry script referenced by index.html.
    #   * dotnet.js             — loaded BY blazor.webassembly.js, and it
    #                             carries the boot manifest (the table that
    #                             maps System.Linq.wasm → the fingerprinted
    #                             System.Linq.<hash>.wasm). If THIS is cached
    #                             immutable, the stale manifest keeps asking
    #                             for deleted hashes even after a fresh
    #                             blazor.webassembly.js — so it needs the same
    #                             no-cache treatment.
    #
    # Exact-match (=) is evaluated before — and wins over — the `^~`
    # prefix and regex locations below.
    location = /_framework/blazor.webassembly.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /_framework/dotnet.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Everything else under _framework is content-hashed → immutable.
    # `^~` makes this prefix win over the generic \.(…|js|…)$ regex block
    # below, so the fingerprinted dotnet.js / dotnet.runtime.*.js / *.wasm
    # all get the long-lived immutable policy (not the 7d generic-asset one).
    location ^~ /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static assets (css/js/images/markdown content) → modest cache.
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?|md|json)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: every unmatched route serves the Blazor host page.
    # index.html itself must never be cached, or clients pin a stale boot.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
